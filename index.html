<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Booking Ruang - DISKOP UKM JATENG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        .bg-jateng { background-color: #1e3a8a; }
        .hidden-auth { display: none !important; }
        .status-pending { background-color: #fef08a; color: #854d0e; }
        .status-approved { background-color: #dcfce7; color: #166534; }
        
        .calendar-day { transition: all 0.2s; cursor: pointer; height: 35px; width: 35px; display: flex; align-items: center; justify-content: center; font-size: 11px; border-radius: 10px; border: 1px solid transparent; }
        .calendar-day:hover:not(.empty) { background-color: #eff6ff; color: #1e40af; border-color: #1e40af; }
        .calendar-day.selected { background-color: #1e3a8a !important; color: white !important; font-weight: bold; }
        
        .time-picker-overlay { 
            display: none; position: absolute; bottom: 100%; left: 0; width: 100%; 
            background: white; border: 1px solid #e2e8f0; border-radius: 1.5rem; 
            box-shadow: 0 -10px 25px rgba(0,0,0,0.1); z-index: 100; padding: 1rem; 
        }
        .time-column { height: 120px; overflow-y: auto; scrollbar-width: none; }
        .time-unit { padding: 0.5rem; text-align: center; cursor: pointer; border-radius: 0.5rem; font-weight: bold; font-size: 13px; }
        .time-unit:hover { background: #f1f5f9; }
        .time-unit.active { background: #1e3a8a; color: white; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div id="loginModal" class="fixed inset-0 bg-blue-900 z-[10000] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8">
            <div class="text-center mb-6">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Coat_of_arms_of_Central_Java.svg/960px-Coat_of_arms_of_Central_Java.svg.png" class="h-20 mx-auto mb-4">
                <h2 class="text-2xl font-black text-blue-900 uppercase">E-Booking</h2>
                <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Dinas Koperasi & UKM Jateng</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Username (admin/user)" class="w-full p-4 border-2 rounded-2xl outline-none focus:border-blue-600 bg-gray-50 font-semibold">
                <input type="password" id="password" placeholder="Password" class="w-full p-4 border-2 rounded-2xl outline-none focus:border-blue-600 bg-gray-50 font-semibold">
                <button onclick="handleLogin()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-blue-900 font-black py-4 rounded-2xl shadow-lg uppercase transition-all">Masuk Ke Sistem</button>
            </div>
        </div>
    </div>

    <div id="appContent" class="hidden-auth">
        <nav class="bg-white shadow-md sticky top-0 z-[1000] border-b-4 border-yellow-500 p-4">
            <div class="container mx-auto flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Coat_of_arms_of_Central_Java.svg/960px-Coat_of_arms_of_Central_Java.svg.png" class="h-10">
                    <h1 class="font-black text-blue-900 text-sm hidden md:block">DISKOP UKM PROV JATENG</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="roleLabel" class="text-[10px] font-black bg-blue-100 text-blue-700 px-4 py-2 rounded-full uppercase"></span>
                    <button onclick="handleLogout()" class="bg-red-100 text-red-600 p-2 rounded-xl hover:bg-red-600 hover:text-white transition">
                        <i class="fas fa-power-off"></i>
                    </button>
                </div>
            </div>
        </nav>

        <header class="bg-jateng text-white py-14 text-center">
            <h2 class="text-3xl font-black uppercase tracking-tighter">Monitoring Ruangan</h2>
            <p id="realtimeClock" class="text-yellow-400 font-mono text-xl mt-2 font-bold">00:00:00</p>
        </header>

        <section id="userFormSection" class="container mx-auto px-6 -mt-10 hidden-auth mb-10">
            <div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-2xl border border-gray-100 p-1">
                <form id="bookingForm" class="grid grid-cols-1 lg:grid-cols-3">
                    <div class="p-6 border-r border-gray-100">
                        <label class="text-[10px] font-black text-gray-400 uppercase mb-4 block tracking-widest">1. Pilih Tanggal</label>
                        <div class="bg-gray-50 p-4 rounded-2xl border">
                            <div class="flex justify-between items-center mb-4">
                                <button type="button" onclick="prevMonth()" class="p-1"><i class="fas fa-chevron-left text-xs"></i></button>
                                <span id="calendarMonth" class="text-xs font-black uppercase text-blue-900"></span>
                                <button type="button" onclick="nextMonth()" class="p-1"><i class="fas fa-chevron-right text-xs"></i></button>
                            </div>
                            <div id="calendarGrid" class="grid grid-cols-7 gap-1 text-center"></div>
                        </div>
                        <input type="hidden" id="tanggal" required>
                        <div id="selectedDateDisplay" class="mt-4 p-3 bg-blue-50 text-blue-800 text-[10px] font-black rounded-xl text-center border border-blue-100 italic">Klik tanggal pada kalender</div>
                    </div>

                    <div class="lg:col-span-2 p-6 space-y-4">
                        <label class="text-[10px] font-black text-gray-400 uppercase block tracking-widest">2. Detail Agenda</label>
                        <input type="text" id="kegiatan" placeholder="Nama Kegiatan / Rapat" required class="w-full p-4 bg-gray-50 border rounded-2xl text-sm font-semibold outline-none focus:border-blue-600">
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <select id="ruangan" class="p-4 bg-gray-50 border rounded-2xl text-sm font-bold outline-none focus:border-blue-600">
                                <option>GATOTKACA</option><option>ARJUNA</option><option>ARIMBI</option><option>PODCAST</option>
                            </select>
                            <select id="bidang" class="p-4 bg-gray-50 border rounded-2xl text-sm font-bold outline-none focus:border-blue-600">
                                <option>UMPEG</option><option>KEUANGAN</option><option>PROGRAM</option><option>RESTRUKTURISASI</option><option>PEMASARAN</option>
                            </select>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="relative">
                                <input type="text" id="jamMulai" placeholder="Jam Mulai" readonly onclick="toggleTimePicker('pickerMulai')" class="w-full p-4 bg-gray-50 border rounded-2xl text-sm font-bold cursor-pointer">
                                <div id="pickerMulai" class="time-picker-overlay">
                                    <div class="flex justify-around"><div class="time-column" id="hoursMulai"></div><div class="time-column" id="minsMulai"></div></div>
                                    <button type="button" onclick="closeTimePicker('pickerMulai')" class="w-full mt-3 bg-blue-900 text-white py-2 rounded-xl text-[10px] font-bold uppercase">Selesai Pilih</button>
                                </div>
                            </div>
                            <div class="relative">
                                <input type="text" id="jamSelesai" placeholder="Jam Selesai" readonly onclick="toggleTimePicker('pickerSelesai')" class="w-full p-4 bg-gray-50 border rounded-2xl text-sm font-bold cursor-pointer">
                                <div id="pickerSelesai" class="time-picker-overlay">
                                    <div class="flex justify-around"><div class="time-column" id="hoursSelesai"></div><div class="time-column" id="minsSelesai"></div></div>
                                    <button type="button" onclick="closeTimePicker('pickerSelesai')" class="w-full mt-3 bg-blue-900 text-white py-2 rounded-xl text-[10px] font-bold uppercase">Selesai Pilih</button>
                                </div>
                            </div>
                        </div>

                        <input type="text" id="pj" placeholder="Nama Penanggung Jawab (PIC)" required class="w-full p-4 bg-gray-50 border rounded-2xl text-sm font-semibold outline-none focus:border-blue-600">
                        
                        <button type="submit" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-black py-5 rounded-2xl shadow-xl transition-all uppercase tracking-widest text-sm">
                            Konfirmasi Booking Sekarang
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <section class="container mx-auto px-6 pb-20">
            <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
                <div class="p-6 border-b flex justify-between items-center bg-gray-50">
                    <h3 class="font-black text-blue-900 uppercase text-sm italic">Jadwal Penggunaan Ruangan</h3>
                    <select id="filterRuangan" onchange="renderTable()" class="text-[10px] font-black p-2 border rounded-xl uppercase bg-white outline-none">
                        <option value="Semua">Semua Ruangan</option>
                        <option>GATOTKACA</option><option>ARJUNA</option><option>ARIMBI</option><option>PODCAST</option>
                    </select>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-blue-900 text-white uppercase font-black">
                            <tr>
                                <th class="p-5">Waktu & Tanggal</th>
                                <th class="p-5">Ruang</th>
                                <th class="p-5">Agenda / PIC</th>
                                <th class="p-5 text-center">Status</th>
                                <th class="p-5 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="bookingTableBody" class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <script>
        // --- FIREBASE INITIALIZATION (FIXED URL) ---
        const firebaseConfig = {
            databaseURL: "https://e-booking-eed92-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let bookings = [];
        let currentUser = JSON.parse(sessionStorage.getItem('active_user')) || null;
        let currentViewDate = new Date();
        let selectedDateStr = "";
        const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

        // --- AUTH LOGIC ---
        function handleLogin() {
            const u = document.getElementById('username').value.trim().toLowerCase();
            const p = document.getElementById('password').value.trim();
            
            if ((u === 'admin' && p === 'admin') || (u === 'user' && p === 'user')) {
                currentUser = { role: u };
                sessionStorage.setItem('active_user', JSON.stringify(currentUser));
                initApp();
                Swal.fire({ icon: 'success', title: 'Berhasil Masuk', timer: 1500, showConfirmButton: false });
            } else {
                Swal.fire('Gagal', 'Username atau password salah!', 'error');
            }
        }

        function handleLogout() {
            sessionStorage.removeItem('active_user');
            window.location.reload();
        }

        function initApp() {
            if (!currentUser) return;
            
            // Sembunyikan modal login, tampilkan konten
            document.getElementById('loginModal').classList.add('hidden-auth');
            document.getElementById('appContent').classList.remove('hidden-auth');
            document.getElementById('roleLabel').innerText = "AKSES: " + currentUser.role.toUpperCase();
            
            if (currentUser.role === 'user') {
                document.getElementById('userFormSection').classList.remove('hidden-auth');
            }

            // Init Components
            generateTimeOptions('hoursMulai', 'minsMulai', 'jamMulai');
            generateTimeOptions('hoursSelesai', 'minsSelesai', 'jamSelesai');
            initCalendar();
            
            // Sync Firebase Realtime
            db.ref('bookings').on('value', (snap) => {
                const val = snap.val();
                bookings = val ? Object.values(val).sort((a,b) => b.id - a.id) : [];
                renderTable();
            });
        }

        // --- CALENDAR LOGIC ---
        function initCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            const y = currentViewDate.getFullYear();
            const m = currentViewDate.getMonth();
            document.getElementById('calendarMonth').innerText = `${months[m]} ${y}`;
            
            const firstDay = new Date(y, m, 1).getDay();
            const daysInMonth = new Date(y, m + 1, 0).getDate();
            const offset = (firstDay === 0 ? 6 : firstDay - 1);

            for (let i = 0; i < offset; i++) grid.innerHTML += `<div class="empty"></div>`;
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isSelected = selectedDateStr === dateStr ? 'selected' : '';
                grid.innerHTML += `<div onclick="selectDate('${dateStr}')" class="calendar-day ${isSelected}">${d}</div>`;
            }
        }

        function selectDate(d) {
            selectedDateStr = d;
            document.getElementById('tanggal').value = d;
            const formatted = new Date(d).toLocaleDateString('id-ID', { dateStyle: 'full' });
            document.getElementById('selectedDateDisplay').innerText = formatted;
            initCalendar();
        }

        function prevMonth() { currentViewDate.setMonth(currentViewDate.getMonth() - 1); initCalendar(); }
        function nextMonth() { currentViewDate.setMonth(currentViewDate.getMonth() + 1); initCalendar(); }

        // --- TIME PICKER LOGIC ---
        function toggleTimePicker(id) {
            const el = document.getElementById(id);
            const isVisible = el.style.display === 'block';
            document.querySelectorAll('.time-picker-overlay').forEach(p => p.style.display = 'none');
            el.style.display = isVisible ? 'none' : 'block';
        }

        function closeTimePicker(id) { document.getElementById(id).style.display = 'none'; }

        function generateTimeOptions(hId, mId, inputId) {
            const hEl = document.getElementById(hId);
            const mEl = document.getElementById(mId);
            hEl.innerHTML = ''; mEl.innerHTML = '';
            for(let i=7; i<=20; i++) {
                let v = String(i).padStart(2, '0');
                hEl.innerHTML += `<div class="time-unit" onclick="setTime('${inputId}','H','${v}',this)">${v}</div>`;
            }
            for(let i=0; i<60; i+=15) {
                let v = String(i).padStart(2, '0');
                mEl.innerHTML += `<div class="time-unit" onclick="setTime('${inputId}','M','${v}',this)">${v}</div>`;
            }
        }

        let tempTime = { jamMulai: {H:'08', M:'00'}, jamSelesai: {H:'09', M:'00'} };
        function setTime(inputId, type, val, el) {
            tempTime[inputId][type] = val;
            el.parentNode.querySelectorAll('.time-unit').forEach(u => u.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(inputId).value = `${tempTime[inputId].H}:${tempTime[inputId].M}`;
        }

        // --- DATA RENDER ---
        function renderTable() {
            const body = document.getElementById('bookingTableBody');
            body.innerHTML = '';
            const filter = document.getElementById('filterRuangan').value;
            const filteredData = filter === 'Semua' ? bookings : bookings.filter(b => b.ruangan === filter);
            
            filteredData.forEach((b) => {
                body.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="p-5"><b>${b.tanggal}</b><br><span class="text-blue-600 font-bold">${b.jam}</span></td>
                        <td class="p-5"><span class="bg-gray-100 px-3 py-1 rounded-lg font-black text-blue-900">${b.ruangan}</span></td>
                        <td class="p-5 font-semibold">${b.kegiatan}<br><small class="text-gray-400 uppercase font-black">PIC: ${b.pj}</small></td>
                        <td class="p-5 text-center"><span class="${b.status === 'Approved' ? 'status-approved' : 'status-pending'} px-3 py-1 rounded-full font-black text-[9px] uppercase">${b.status}</span></td>
                        <td class="p-5 text-center">
                            ${currentUser.role === 'admin' ? `
                                <button onclick="updateStatus('${b.id}', 'Approved')" class="bg-green-500 text-white w-8 h-8 rounded-lg hover:bg-green-600 shadow-md mr-1">✔</button>
                                <button onclick="deleteBooking('${b.id}')" class="bg-red-500 text-white w-8 h-8 rounded-lg hover:bg-red-600 shadow-md">✖</button>
                            ` : '-'}
                        </td>
                    </tr>`;
            });
        }

        function updateStatus(id, stat) {
            db.ref('bookings/' + id).update({ status: stat });
        }

        function deleteBooking(id) {
            Swal.fire({
                title: 'Hapus Data?',
                text: "Data booking akan dihapus permanen!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'Ya, Hapus!'
            }).then((result) => {
                if (result.isConfirmed) db.ref('bookings/' + id).remove();
            });
        }

        // --- FORM SUBMIT ---
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (!selectedDateStr) return Swal.fire('Error', 'Pilih tanggal di kalender!', 'error');
            if (!document.getElementById('jamMulai').value || !document.getElementById('jamSelesai').value) 
                return Swal.fire('Error', 'Pilih jam kegiatan!', 'error');

            const id = Date.now();
            const payload = {
                id: id,
                tanggal: selectedDateStr,
                jam: document.getElementById('jamMulai').value + ' - ' + document.getElementById('jamSelesai').value,
                ruangan: document.getElementById('ruangan').value,
                kegiatan: document.getElementById('kegiatan').value,
                bidang: document.getElementById('bidang').value,
                pj: document.getElementById('pj').value,
                status: 'Pending'
            };

            db.ref('bookings/' + id).set(payload).then(() => {
                Swal.fire('Berhasil', 'Pemesanan telah masuk antrean!', 'success');
                this.reset();
                selectedDateStr = "";
                document.getElementById('selectedDateDisplay').innerText = "Klik tanggal pada kalender";
                initCalendar();
            }).catch(err => Swal.fire('Error', 'Database error: ' + err.message, 'error'));
        });

        // --- BOOTSTRAP ---
        window.onload = () => {
            if (currentUser) initApp();
            
            // Jam Realtime
            setInterval(() => {
                const now = new Date();
                document.getElementById('realtimeClock').innerText = now.toLocaleTimeString('id-ID');
            }, 1000);
        };
    </script>
</body>
</html>
