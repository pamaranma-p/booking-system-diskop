<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Booking Ruang - Dinas Koperasi & UKM Jateng</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; }
        .bg-jateng { background-color: #1e3a8a; }

        .fc { background: white; border-radius: 2rem; padding: 20px; border: none !important; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .dark .fc { background: #1e293b; color: white; border: 1px solid #334155 !important; }
        .fc-event { cursor: pointer; border: none; padding: 4px 8px; font-size: 10px; font-weight: 800; border-radius: 6px; margin: 1px 0; text-transform: uppercase; }
        .fc-toolbar-title { font-weight: 900 !important; text-transform: uppercase; font-size: 1.1rem !important; color: #1e3a8a; }
        .dark .fc-toolbar-title { color: #facc15; }
        .fc-button-primary { background-color: #1e3a8a !important; border: none !important; font-size: 11px !important; font-weight: 800 !important; text-transform: uppercase; border-radius: 10px !important; }

        .calendar-day { transition: all 0.2s; cursor: pointer; height: 35px; width: 35px; display: flex; align-items: center; justify-content: center; font-size: 11px; border-radius: 10px; }
        .calendar-day.selected { background-color: #1e3a8a !important; color: white !important; }

        .time-picker-overlay { display: none; position: absolute; bottom: 100%; left: 0; width: 100%; background: white; border: 1px solid #e2e8f0; border-radius: 1.5rem; z-index: 999; padding: 1rem; }
        .dark .time-picker-overlay { background: #1e293b; border-color: #334155; }
        .time-column { height: 120px; overflow-y: auto; scrollbar-width: none; }
        .time-unit { padding: 0.5rem; text-align: center; cursor: pointer; border-radius: 0.5rem; font-weight: bold; font-size: 14px; }
        .time-unit.active { background: #1e3a8a; color: white; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-slate-900 dark:text-gray-100">

<div id="appContent">
    <nav class="bg-white dark:bg-slate-800 shadow-sm sticky top-0 z-50 border-b-4 border-yellow-500">
        <div class="container mx-auto px-6 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Coat_of_arms_of_Central_Java.svg/960px-Coat_of_arms_of_Central_Java.svg.png" class="h-10">
                <div>
                    <h1 class="font-black text-blue-900 dark:text-blue-400 text-xs leading-none">DISKOP UKM</h1>
                    <p class="text-[9px] font-bold text-gray-400 uppercase italic">Provinsi Jawa Tengah</p>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <button onclick="toggleDarkMode()" class="w-10 h-10 rounded-xl bg-gray-100 dark:bg-slate-700 text-gray-500 dark:text-yellow-400 flex items-center justify-center">
                    <i id="themeIcon" class="fas fa-moon"></i>
                </button>
                <span id="roleLabel" class="text-[10px] font-black bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 px-4 py-2 rounded-full border border-blue-100 dark:border-blue-800 uppercase italic">GUEST</span>
            </div>
        </div>
    </nav>

    <header class="bg-jateng text-white py-16 px-6 text-center relative">
        <h2 class="text-3xl md:text-4xl font-black uppercase mb-2 tracking-tighter">Monitoring & Reservasi</h2>
        <p class="opacity-80 text-sm font-light">Sistem Informasi Penggunaan Ruang Rapat</p>
    </header>

    <section id="userFormSection" class="container mx-auto px-6 -mt-10 hidden mb-12 relative z-50">
        <div class="max-w-5xl mx-auto bg-white dark:bg-slate-800 rounded-3xl shadow-2xl border border-gray-100 dark:border-slate-700 overflow-hidden">
            <div class="bg-gray-50 dark:bg-slate-800/50 p-5 border-b dark:border-slate-700">
                <h3 class="font-black text-blue-900 dark:text-blue-400 text-xs uppercase italic">
                    <i class="fas fa-edit mr-2 text-yellow-500"></i> Buat Permohonan Reservasi
                </h3>
            </div>

            <form id="bookingForm" onsubmit="simpanKeFirebase(event)" class="grid grid-cols-1 lg:grid-cols-3">
                <div class="p-6 lg:border-r border-gray-100 dark:border-slate-700">
                    <label class="text-[10px] font-black text-gray-400 uppercase mb-4 block">1. Klik Tanggal</label>
                    <div class="bg-gray-50 dark:bg-slate-900 p-4 rounded-2xl border">
                        <div class="flex justify-between items-center mb-4">
                            <button type="button" onclick="prevMonth()"><i class="fas fa-chevron-left text-xs"></i></button>
                            <h4 id="calendarMonth" class="font-black uppercase text-[10px]"></h4>
                            <button type="button" onclick="nextMonth()"><i class="fas fa-chevron-right text-xs"></i></button>
                        </div>
                        <div id="calendarGrid" class="grid grid-cols-7 gap-1"></div>
                    </div>
                    <input type="hidden" id="tanggal" required>
                    <div id="selectedDateDisplay" class="mt-4 p-3 bg-blue-50 dark:bg-blue-900/20 rounded-xl text-[10px] font-bold text-blue-700 dark:text-blue-300 text-center italic">
                        Belum pilih tanggal
                    </div>
                </div>

                <div class="lg:col-span-2 p-6 space-y-4">
                    <label class="text-[10px] font-black text-gray-400 uppercase block">2. Detail Kegiatan</label>
                    <input type="text" id="kegiatan" placeholder="Nama Kegiatan" required class="w-full p-3 bg-gray-50 dark:bg-slate-900 rounded-xl outline-none focus:ring-2 ring-blue-500 text-sm font-semibold">

                    <div class="grid grid-cols-2 gap-4">
                        <select id="ruangan" class="p-3 bg-gray-50 dark:bg-slate-900 rounded-xl font-bold text-xs uppercase">
                            <option>GATOTKACA</option>
                            <option>ARJUNA</option>
                            <option>ARIMBI</option>
                            <option>PODCAST</option>
                        </select>

                        <select id="bidang" class="p-3 bg-gray-50 dark:bg-slate-900 rounded-xl font-bold text-xs uppercase">
                            <option>UMPEG</option>
                            <option>PROGRAM</option>
                            <option>KEUANGAN</option>
                            <option>BINA USAHA KOPERASI</option>
                            <option>PENGEMBANGAN DAN DAYA SAING USAHA KECIL MENENGAH</option>
                            <option>KELEMBAGAAN DAN PENGAWASAN KOPERASI</option>
                            <option>PEMBERDAYAAN DAN PEMBIAYAAN USAHA KECIL DAN MENENGAH</option>
                            <option>BALATKOP UKMK</option>
                            <option>DHARMA WANITA</option>
                        </select>

                        <div class="relative">
                            <input type="text" id="jamMulai" placeholder="Mulai" readonly onclick="toggleTimePicker('pickerMulai')" class="w-full p-3 bg-gray-50 dark:bg-slate-900 rounded-xl text-xs font-bold text-center cursor-pointer">
                            <div id="pickerMulai" class="time-picker-overlay">
                                <div class="flex justify-around">
                                    <div class="time-column" id="hoursMulai"></div>
                                    <div class="time-column" id="minsMulai"></div>
                                </div>
                                <button type="button" onclick="closeTimePicker('pickerMulai')" class="w-full mt-3 bg-blue-900 text-white py-2 rounded-xl text-[10px] font-bold uppercase">Set Jam</button>
                            </div>
                        </div>

                        <div class="relative">
                            <input type="text" id="jamSelesai" placeholder="Selesai" readonly onclick="toggleTimePicker('pickerSelesai')" class="w-full p-3 bg-gray-50 dark:bg-slate-900 rounded-xl text-xs font-bold text-center cursor-pointer">
                            <div id="pickerSelesai" class="time-picker-overlay">
                                <div class="flex justify-around">
                                    <div class="time-column" id="hoursSelesai"></div>
                                    <div class="time-column" id="minsSelesai"></div>
                                </div>
                                <button type="button" onclick="closeTimePicker('pickerSelesai')" class="w-full mt-3 bg-blue-900 text-white py-2 rounded-xl text-[10px] font-bold uppercase">Set Jam</button>
                            </div>
                        </div>
                    </div>

                    <input type="text" id="pj" placeholder="PIC (Penanggung Jawab)" required class="w-full p-3 bg-gray-50 dark:bg-slate-900 rounded-xl text-sm font-bold uppercase">

                    <button type="submit" class="w-full bg-blue-700 text-white font-black py-4 rounded-xl hover:bg-blue-800 uppercase text-xs tracking-widest shadow-lg transition active:scale-95">
                        Ajukan Reservasi
                    </button>
                </div>
            </form>
        </div>
    </section>

    <section class="container mx-auto px-6 py-12">
        <div class="flex flex-col md:flex-row justify-between items-end mb-8 gap-4">
            <div>
                <h3 class="font-900 text-2xl text-blue-900 dark:text-white uppercase italic tracking-tighter">Jadwal Kalender</h3>
                <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Visualisasi Penggunaan Ruangan</p>
            </div>

            <div class="flex gap-2 w-full md:w-auto">
                <button id="downloadBtn" onclick="downloadRekapan()" class="hidden text-[10px] font-black px-4 py-3 bg-green-600 text-white shadow-sm rounded-xl border-b-4 border-green-800 uppercase hover:bg-green-700 transition active:scale-95">
                    <i class="fas fa-file-excel mr-2"></i> Unduh Rekap
                </button>

                <select id="filterRuangan" onchange="renderCalendar()" class="text-[10px] font-black px-4 py-3 bg-white dark:bg-slate-800 shadow-sm rounded-xl border-b-4 border-yellow-500 uppercase">
                    <option value="Semua">Semua Ruangan</option>
                    <option>GATOTKACA</option>
                    <option>ARJUNA</option>
                    <option>ARIMBI</option>
                    <option>PODCAST</option>
                </select>
            </div>
        </div>

        <div id="calendarMain"></div>

        <div id="loader" class="p-20 text-center font-black text-gray-400 animate-pulse uppercase text-[10px]">
            Menyelaraskan Agenda...
        </div>
    </section>

    <footer class="bg-blue-900 text-white py-8 px-6 mt-12 border-t-8 border-yellow-500 text-center">
        <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">&copy; 2026 DISKOP UKM JATENG</p>
    </footer>
</div>

<script>
const firebaseConfig = {
    databaseURL: "https://console.firebase.google.com/u/0/project/databasebooking-cfa37/database/databasebooking-cfa37-default-rtdb/data/~2F"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allBookings = [];
let currentRole = 'guest';
let calendar;
let currentFormDate = new Date();
let selectedDateStr = "";
let tempTime = {
    jamMulai: { H:'08', M:'00' },
    jamSelesai: { H:'10', M:'00' }
};

window.onload = () => {
    detectRole();
    initTheme();

    if (currentRole === 'user') {
        generateTimeOptions('hoursMulai', 'minsMulai', 'jamMulai');
        generateTimeOptions('hoursSelesai', 'minsSelesai', 'jamSelesai');
        initFormCalendar();
    }

    tarikDataFirebase();
};

function detectRole() {
    const params = new URLSearchParams(window.location.search);
    const role = params.get('role');

    if (role === 'adalahadmin') {
        currentRole = 'admin';
        document.getElementById('downloadBtn').classList.remove('hidden');
    } else if (role === 'adalahuser') {
        currentRole = 'user';
        document.getElementById('userFormSection').classList.remove('hidden');
    }

    document.getElementById('roleLabel').innerText = "AKSES: " + currentRole.toUpperCase();
}

function renderCalendar() {
    const calendarEl = document.getElementById('calendarMain');
    const filter = document.getElementById('filterRuangan').value;

    const data = (filter === 'Semua')
        ? allBookings
        : allBookings.filter(b => b.ruangan === filter);

    const events = data.map(b => ({
        id: b.id,
        title: `[${b.ruangan}] ${b.kegiatan}`,
        start: b.tanggal,
        backgroundColor:
            b.status === 'Approved' ? '#22c55e'
            : b.status === 'Rejected' ? '#ef4444'
            : '#facc15',
        extendedProps: { ...b }
    }));

    if (calendar) calendar.destroy();

    calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'id',
        events: events,
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek'
        },
        eventClick: (info) => showBookingDetail(info.event.extendedProps)
    });

    calendar.render();
    document.getElementById('loader').style.display = 'none';
}

function showBookingDetail(p) {
    Swal.fire({
        title: `<p class="text-sm font-black uppercase text-blue-900">${p.kegiatan}</p>`,
        html: `
            <div class="text-left text-xs space-y-3 p-4 bg-gray-50 dark:bg-slate-900 rounded-2xl border dark:border-slate-700">
                <p><strong>Ruang:</strong> ${p.ruangan}</p>
                <p><strong>Waktu:</strong> ${p.jam}</p>
                <p><strong>Bidang:</strong> ${p.bidang}</p>
                <p><strong>PIC:</strong> ${p.pj}</p>
                <p><strong>Status:</strong> ${p.status}</p>
            </div>
        `,
        showConfirmButton: false,
        showCloseButton: true
    });
}

function initFormCalendar() {
    const grid = document.getElementById('calendarGrid');
    const monthLabel = document.getElementById('calendarMonth');
    const months = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
    grid.innerHTML = '';
    const year = currentFormDate.getFullYear();
    const month = currentFormDate.getMonth();
    monthLabel.innerText = `${months[month]} ${year}`;
    const firstDay = new Date(year, month, 1).getDay();
    const days = new Date(year, month + 1, 0).getDate();
    let offset = firstDay === 0 ? 6 : firstDay - 1;

    ['S','S','R','K','J','S','M'].forEach(h => {
        grid.innerHTML += `<div class="text-[8px] font-black text-gray-300 text-center">${h}</div>`;
    });

    for (let i = 0; i < offset; i++) {
        grid.innerHTML += `<div class="calendar-day empty"></div>`;
    }

    for (let d = 1; d <= days; d++) {
        const ds = `${year}-${String(month + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        grid.innerHTML += `
            <div onclick="selectDate('${ds}')" class="calendar-day ${selectedDateStr === ds ? 'selected' : ''}">
                ${d}
            </div>
        `;
    }
}

function selectDate(date) {
    selectedDateStr = date;
    document.getElementById('tanggal').value = date;
    document.getElementById('selectedDateDisplay').innerText =
        new Date(date).toLocaleDateString('id-ID', { dateStyle: 'full' });
    initFormCalendar();
}

function prevMonth() {
    currentFormDate.setMonth(currentFormDate.getMonth() - 1);
    initFormCalendar();
}

function nextMonth() {
    currentFormDate.setMonth(currentFormDate.getMonth() + 1);
    initFormCalendar();
}

function generateTimeOptions(targetHours, targetMins, inputId) {
    const hDiv = document.getElementById(targetHours);
    const mDiv = document.getElementById(targetMins);
    for (let i = 7; i <= 18; i++) {
        const val = String(i).padStart(2, '0');
        hDiv.innerHTML += `<div class="time-unit" onclick="setTimePart('${inputId}','H','${val}',this)">${val}</div>`;
    }
    ['00','15','30','45'].forEach(val => {
        mDiv.innerHTML += `<div class="time-unit" onclick="setTimePart('${inputId}','M','${val}',this)">${val}</div>`;
    });
}

function setTimePart(inputId, type, val, el) {
    const container = el.parentElement;
    container.querySelectorAll('.time-unit').forEach(u => u.classList.remove('active'));
    tempTime[inputId][type] = val;
    el.classList.add('active');
    document.getElementById(inputId).value = `${tempTime[inputId].H}:${tempTime[inputId].M}`;
}

function toggleTimePicker(id) {
    const el = document.getElementById(id);
    el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function closeTimePicker(id) {
    document.getElementById(id).style.display = 'none';
}

function tarikDataFirebase() {
    db.ref('bookings').on('value', (snap) => {
        allBookings = [];
        snap.forEach(child => allBookings.push(child.val()));
        renderCalendar();
    });
}

// LOGIKA DETEKSI TABRAKAN WAKTU
function isOverlapping(newStart, newEnd, existingRange) {
    const [exStartStr, exEndStr] = existingRange.split(' - ');
    const toMin = (s) => {
        const [h, m] = s.split(':').map(Number);
        return h * 60 + m;
    };
    const nS = toMin(newStart);
    const nE = toMin(newEnd);
    const eS = toMin(exStartStr);
    const eE = toMin(exEndStr);
    return nS < eE && nE > eS;
}

async function simpanKeFirebase(e) {
    e.preventDefault();
    const tgl = document.getElementById('tanggal').value;
    const jamMulai = document.getElementById('jamMulai').value;
    const jamSelesai = document.getElementById('jamSelesai').value;
    const ruangan = document.getElementById('ruangan').value;

    if (!tgl || !jamMulai || !jamSelesai) {
        return Swal.fire('Error', 'Pilih tanggal dan tentukan jam!', 'warning');
    }

    // CEK BENTROK JADWAL
    const bentrok = allBookings.find(b => {
        return b.tanggal === tgl && 
               b.ruangan === ruangan && 
               b.status !== 'Rejected' && 
               isOverlapping(jamMulai, jamSelesai, b.jam);
    });

    if (bentrok) {
        return Swal.fire({
            icon: 'error',
            title: 'Jadwal Bentrok!',
            text: `Ruangan ${ruangan} sudah dibooking untuk kegiatan: "${bentrok.kegiatan}" pada jam ${bentrok.jam}.`,
        });
    }

    const id = Date.now().toString();
    db.ref('bookings/' + id).set({
        id: id,
        tanggal: tgl,
        jam: jamMulai + ' - ' + jamSelesai,
        ruangan: ruangan,
        kegiatan: document.getElementById('kegiatan').value,
        bidang: document.getElementById('bidang').value,
        pj: document.getElementById('pj').value,
        status: 'Pending'
    }).then(() => {
        Swal.fire('Berhasil!', 'Reservasi terkirim!', 'success');
        document.getElementById('bookingForm').reset();
        selectedDateStr = "";
        initFormCalendar();
    });
}

function toggleDarkMode() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

function initTheme() {
    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
    }
}

/* HANYA ADMIN BISA DOWNLOAD */
function downloadRekapan() {
    // PROTEKSI LOGIN/ROLE
    if (currentRole !== 'admin') {
        return Swal.fire('Akses Ditolak', 'Hanya admin yang dapat mengunduh rekap.', 'error');
    }

    if (allBookings.length === 0) {
        return Swal.fire('Gagal', 'Tidak ada data untuk diunduh', 'error');
    }

    const currentViewDate = calendar.getDate();
    const currentMonth = currentViewDate.getMonth();
    const currentYear = currentViewDate.getFullYear();
    const monthNames = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];

    const filteredData = allBookings.filter(b => {
        const d = new Date(b.tanggal);
        return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
    }).sort((a, b) => new Date(a.tanggal) - new Date(b.tanggal));

    if (filteredData.length === 0) {
        return Swal.fire('Info', `Tidak ada booking pada bulan ${monthNames[currentMonth]} ${currentYear}`, 'info');
    }

    const dataExcel = filteredData.map((b, index) => ({
        "No": index + 1,
        "Tanggal": b.tanggal,
        "Waktu": b.jam,
        "Ruangan": b.ruangan,
        "Kegiatan": b.kegiatan,
        "Bidang": b.bidang,
        "PIC": b.pj,
        "Status": b.status
    }));

    const worksheet = XLSX.utils.json_to_sheet(dataExcel);
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "Rekap Booking");
    const fileName = `REKAP_BOOKING_${monthNames[currentMonth].toUpperCase()}_${currentYear}.xlsx`;
    XLSX.writeFile(workbook, fileName);

    Swal.fire('Berhasil!', `Rekapan bulan ${monthNames[currentMonth]} telah diunduh.`, 'success');
}
</script>

</body>
</html>
