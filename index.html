<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Booking DISKOP UKM JATENG</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        
        .hidden-auth { display: none !important; }
        
        /* Kalender */
        .cal-day { 
            height: 40px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; border-radius: 10px; font-size: 12px; font-weight: bold;
            transition: all 0.2s;
        }
        .cal-day:hover { background-color: #dbeafe; color: #1e3a8a; }
        .cal-day.active-date { background-color: #1e3a8a !important; color: white !important; }
        
        /* Time Picker */
        .tp-overlay { 
            display: none; position: absolute; bottom: 105%; left: 0; width: 100%; 
            background: white; border: 1px solid #e5e7eb; border-radius: 1rem; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 100; padding: 10px;
        }
        .tp-col { height: 100px; overflow-y: auto; scrollbar-width: none; }
        .tp-item { padding: 5px; text-align: center; cursor: pointer; border-radius: 6px; font-size: 13px; }
        .tp-item.selected-time { background: #1e3a8a; color: white; }

        .btn-primary { background-color: #1e3a8a; color: white; transition: all 0.3s; }
        .btn-primary:hover { background-color: #1e40af; transform: translateY(-1px); }
    </style>
</head>
<body>

    <div id="loginPage" class="fixed inset-0 bg-slate-900 z-[9999] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl">
            <div class="text-center mb-8">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Coat_of_arms_of_Central_Java.svg/960px-Coat_of_arms_of_Central_Java.svg.png" class="h-20 mx-auto mb-4">
                <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tighter">E-Booking Login</h1>
                <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest mt-1">Dinas Koperasi & UKM Jawa Tengah</p>
            </div>
            
            <div class="space-y-4">
                <input type="text" id="logUser" placeholder="Username (admin / user)" class="w-full p-4 border-2 border-gray-100 rounded-2xl outline-none focus:border-blue-600 bg-gray-50 font-bold">
                <input type="password" id="logPass" placeholder="Password" class="w-full p-4 border-2 border-gray-100 rounded-2xl outline-none focus:border-blue-600 bg-gray-50 font-bold">
                <button onclick="doLogin()" class="w-full btn-primary py-4 rounded-2xl font-black uppercase tracking-widest shadow-lg">Masuk Sekarang</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden-auth">
        <nav class="bg-white border-b-4 border-yellow-500 p-4 sticky top-0 z-50 shadow-sm">
            <div class="container mx-auto flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Coat_of_arms_of_Central_Java.svg/960px-Coat_of_arms_of_Central_Java.svg.png" class="h-8">
                    <span class="font-black text-slate-800 text-sm uppercase">Booking System</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="displayRole" class="text-[10px] font-black bg-blue-100 text-blue-800 px-3 py-1 rounded-full uppercase"></span>
                    <button onclick="doLogout()" class="text-red-500 hover:text-red-700 transition"><i class="fas fa-power-off"></i></button>
                </div>
            </div>
        </nav>

        <div class="container mx-auto px-4 py-8">
            <div id="bookingSection" class="hidden-auth mb-10">
                <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100 max-w-5xl mx-auto">
                    <div class="bg-slate-800 p-4 text-white text-center font-bold uppercase text-xs tracking-widest">Formulir Pemesanan Ruang</div>
                    <form id="formBooking" class="grid grid-cols-1 lg:grid-cols-3">
                        <div class="p-6 border-r border-gray-50">
                            <div class="flex justify-between items-center mb-4">
                                <button type="button" onclick="moveMonth(-1)"><i class="fas fa-chevron-left text-xs"></i></button>
                                <span id="calTitle" class="text-xs font-black uppercase"></span>
                                <button type="button" onclick="moveMonth(1)"><i class="fas fa-chevron-right text-xs"></i></button>
                            </div>
                            <div id="calGrid" class="grid grid-cols-7 gap-1 mb-4"></div>
                            <div id="datePreview" class="text-[10px] font-bold text-blue-600 bg-blue-50 p-2 rounded-lg text-center uppercase tracking-tighter">Pilih Tanggal Rapat</div>
                        </div>

                        <div class="lg:col-span-2 p-6 space-y-4">
                            <input type="text" id="inpAgenda" placeholder="Nama Agenda / Rapat" required class="w-full p-4 bg-gray-50 border rounded-2xl font-bold text-sm outline-none focus:border-blue-600">
                            
                            <div class="grid grid-cols-2 gap-4">
                                <select id="inpRuang" class="p-4 bg-gray-50 border rounded-2xl font-bold text-sm outline-none">
                                    <option>GATOTKACA</option><option>ARJUNA</option><option>ARIMBI</option><option>PODCAST</option>
                                </select>
                                <select id="inpBidang" class="p-4 bg-gray-50 border rounded-2xl font-bold text-sm outline-none">
                                    <option>UMPEG</option><option>KEUANGAN</option><option>PROGRAM</option><option>PEMASARAN</option>
                                </select>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div class="relative">
                                    <input type="text" id="inpMulai" placeholder="Jam Mulai" readonly onclick="openTP('tpMulai')" class="w-full p-4 bg-gray-50 border rounded-2xl font-bold text-sm cursor-pointer">
                                    <div id="tpMulai" class="tp-overlay">
                                        <div class="flex justify-around"><div class="tp-col" id="hMulai"></div><div class="tp-col" id="mMulai"></div></div>
                                        <button type="button" onclick="closeTP('tpMulai')" class="w-full mt-2 bg-slate-800 text-white py-1 rounded-lg text-[10px] font-bold">SET</button>
                                    </div>
                                </div>
                                <div class="relative">
                                    <input type="text" id="inpSelesai" placeholder="Jam Selesai" readonly onclick="openTP('tpSelesai')" class="w-full p-4 bg-gray-50 border rounded-2xl font-bold text-sm cursor-pointer">
                                    <div id="tpSelesai" class="tp-overlay">
                                        <div class="flex justify-around"><div class="tp-col" id="hSelesai"></div><div class="tp-col" id="mSelesai"></div></div>
                                        <button type="button" onclick="closeTP('tpSelesai')" class="w-full mt-2 bg-slate-800 text-white py-1 rounded-lg text-[10px] font-bold">SET</button>
                                    </div>
                                </div>
                            </div>

                            <input type="text" id="inpPJ" placeholder="Penanggung Jawab" required class="w-full p-4 bg-gray-50 border rounded-2xl font-bold text-sm outline-none">
                            <button type="submit" class="w-full btn-primary py-4 rounded-2xl font-black uppercase tracking-widest">Kirim Reservasi</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
                <div class="p-6 border-b flex justify-between items-center">
                    <h2 class="font-black text-slate-800 uppercase tracking-tighter">Jadwal Penggunaan Ruang</h2>
                    <div id="timeClock" class="text-blue-600 font-mono font-bold text-sm"></div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 text-slate-400 font-black uppercase text-[10px] tracking-widest">
                            <tr>
                                <th class="p-4">Tanggal & Jam</th>
                                <th class="p-4">Ruangan</th>
                                <th class="p-4">Kegiatan / PIC</th>
                                <th class="p-4 text-center">Status</th>
                                <th class="p-4 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-gray-50"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI FIREBASE ---
        const firebaseConfig = { databaseURL: "https://e-booking-eed92-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- STATE ---
        let currentRole = null;
        let viewDate = new Date();
        let selectedDate = "";
        let allBookings = [];

        // --- AUTH ---
        function doLogin() {
            const u = document.getElementById('logUser').value.toLowerCase();
            const p = document.getElementById('logPass').value;
            
            if ((u === 'admin' && p === 'admin') || (u === 'user' && p === 'user')) {
                currentRole = u;
                sessionStorage.setItem('e_role', u);
                
                // Animasi Transisi
                document.getElementById('loginPage').classList.add('hidden-auth');
                document.getElementById('mainApp').classList.remove('hidden-auth');
                
                startApp();
            } else {
                Swal.fire('Gagal', 'Username/Password Salah', 'error');
            }
        }

        function doLogout() {
            sessionStorage.clear();
            window.location.reload();
        }

        // --- APP ENGINE ---
        function startApp() {
            const role = sessionStorage.getItem('e_role');
            if(!role) return;
            
            document.getElementById('displayRole').innerText = "Akses: " + role;
            if(role === 'user') document.getElementById('bookingSection').classList.remove('hidden-auth');
            
            initCalendar();
            setupTimePicker();
            
            // Listen Database
            db.ref('bookings').on('value', (snap) => {
                const data = snap.val();
                allBookings = data ? Object.values(data).sort((a,b) => b.id - a.id) : [];
                renderTable();
            });
        }

        // --- KALENDER ---
        const months = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
        function initCalendar() {
            const grid = document.getElementById('calGrid');
            grid.innerHTML = '';
            const y = viewDate.getFullYear();
            const m = viewDate.getMonth();
            document.getElementById('calTitle').innerText = `${months[m]} ${y}`;

            const first = new Date(y, m, 1).getDay();
            const last = new Date(y, m+1, 0).getDate();
            const startDay = first === 0 ? 6 : first - 1;

            for(let i=0; i<startDay; i++) grid.innerHTML += `<div></div>`;
            for(let d=1; d<=last; d++) {
                const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const activeClass = selectedDate === ds ? 'active-date' : '';
                grid.innerHTML += `<div onclick="pickDate('${ds}')" class="cal-day ${activeClass}">${d}</div>`;
            }
        }

        function pickDate(d) {
            selectedDate = d;
            document.getElementById('datePreview').innerText = new Date(d).toLocaleDateString('id-ID', { dateStyle: 'full' });
            initCalendar();
        }

        function moveMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); initCalendar(); }

        // --- TIME PICKER ---
        function openTP(id) {
            document.querySelectorAll('.tp-overlay').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
        function closeTP(id) { document.getElementById(id).style.display = 'none'; }

        function setupTimePicker() {
            const h = ["hMulai", "hSelesai"];
            const m = ["mMulai", "mSelesai"];
            const target = ["inpMulai", "inpSelesai"];

            h.forEach((id, idx) => {
                const el = document.getElementById(id);
                for(let i=7; i<=21; i++){
                    let v = String(i).padStart(2,'0');
                    el.innerHTML += `<div class="tp-item" onclick="setTime('${target[idx]}','H','${v}',this)">${v}</div>`;
                }
            });

            m.forEach((id, idx) => {
                const el = document.getElementById(id);
                [0, 15, 30, 45].forEach(v => {
                    let s = String(v).padStart(2,'0');
                    el.innerHTML += `<div class="tp-item" onclick="setTime('${target[idx]}','M','${s}',this)">${s}</div>`;
                });
            });
        }

        let timeState = { inpMulai: {h:'08', m:'00'}, inpSelesai: {h:'09', m:'00'} };
        function setTime(tid, type, val, el) {
            if(type === 'H') timeState[tid].h = val; else timeState[tid].m = val;
            el.parentNode.querySelectorAll('.tp-item').forEach(i => i.classList.remove('selected-time'));
            el.classList.add('selected-time');
            document.getElementById(tid).value = `${timeState[tid].h}:${timeState[tid].m}`;
        }

        // --- TABLE RENDER ---
        function renderTable() {
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            allBookings.forEach((b) => {
                const statusColor = b.status === 'Approved' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700';
                body.innerHTML += `
                    <tr>
                        <td class="p-4 font-bold text-slate-700">${b.tanggal}<br><span class="text-blue-600">${b.jam}</span></td>
                        <td class="p-4 font-black text-slate-800">${b.ruangan}</td>
                        <td class="p-4 font-medium">${b.agenda}<br><small class="text-gray-400 uppercase font-black">PIC: ${b.pj}</small></td>
                        <td class="p-4 text-center"><span class="${statusColor} px-2 py-1 rounded-full text-[9px] font-black uppercase">${b.status}</span></td>
                        <td class="p-4 text-center">
                            ${sessionStorage.getItem('e_role') === 'admin' ? `
                                <button onclick="actStatus('${b.id}', 'Approved')" class="text-green-500 mr-2"><i class="fas fa-check-circle"></i></button>
                                <button onclick="actDelete('${b.id}')" class="text-red-500"><i class="fas fa-trash"></i></button>
                            ` : '-'}
                        </td>
                    </tr>`;
            });
        }

        // --- ACTIONS ---
        function actStatus(id, s) { db.ref('bookings/'+id).update({status: s}); }
        function actDelete(id) { db.ref('bookings/'+id).remove(); }

        document.getElementById('formBooking').onsubmit = function(e) {
            e.preventDefault();
            if(!selectedDate) return Swal.fire('Error', 'Pilih tanggal dulu!', 'warning');
            
            const id = Date.now();
            const data = {
                id: id,
                tanggal: selectedDate,
                jam: document.getElementById('inpMulai').value + " - " + document.getElementById('inpSelesai').value,
                ruangan: document.getElementById('inpRuang').value,
                agenda: document.getElementById('inpAgenda').value,
                bidang: document.getElementById('inpBidang').value,
                pj: document.getElementById('inpPJ').value,
                status: 'Pending'
            };

            db.ref('bookings/'+id).set(data).then(() => {
                Swal.fire('Berhasil', 'Pemesanan dikirim!', 'success');
                this.reset();
                selectedDate = "";
                initCalendar();
            });
        };

        // --- BOOTSTRAP ---
        window.onload = () => {
            if(sessionStorage.getItem('e_role')) startApp();
            setInterval(() => { document.getElementById('timeClock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
        };
    </script>
</body>
</html>
