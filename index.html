<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Booking Ruang - DISKOP UKM JATENG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .bg-jateng { background-color: #1e3a8a; }
        .hidden-auth { display: none !important; }
        .status-pending { background-color: #fef08a; color: #854d0e; }
        .status-approved { background-color: #dcfce7; color: #166534; }
        .calendar-day { transition: all 0.2s; cursor: pointer; height: 35px; width: 35px; display: flex; align-items: center; justify-content: center; font-size: 11px; border-radius: 10px; }
        .calendar-day:hover:not(.empty) { background-color: #eff6ff; color: #1e40af; }
        .calendar-day.selected { background-color: #1e3a8a !important; color: white !important; }
        .time-picker-overlay { 
            display: none; position: absolute; bottom: 100%; left: 0; width: 100%; 
            background: white; border: 1px solid #e2e8f0; border-radius: 1.5rem; 
            box-shadow: 0 -10px 25px rgba(0,0,0,0.1); z-index: 50; padding: 1rem; 
        }
        .time-column { height: 120px; overflow-y: auto; scrollbar-width: none; }
        .time-unit { padding: 0.4rem; text-align: center; cursor: pointer; border-radius: 0.5rem; font-weight: bold; font-size: 13px; }
        .time-unit.active { background: #1e3a8a; color: white; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div id="loginModal" class="fixed inset-0 bg-jateng z-[9999] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8">
            <div class="text-center mb-8">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Coat_of_arms_of_Central_Java.svg/960px-Coat_of_arms_of_Central_Java.svg.png" class="h-16 mx-auto mb-4">
                <h2 class="text-xl font-black text-blue-900 uppercase">E-Booking Ruangan</h2>
            </div>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Username (admin/user)" class="w-full p-4 border-2 rounded-2xl outline-none focus:border-blue-600 bg-gray-50">
                <input type="password" id="password" placeholder="Password" class="w-full p-4 border-2 rounded-2xl outline-none focus:border-blue-600 bg-gray-50">
                <button onclick="handleLogin()" class="w-full bg-blue-700 text-white font-black py-4 rounded-2xl hover:bg-blue-800 shadow-xl uppercase">Masuk</button>
            </div>
        </div>
    </div>

    <div id="appContent" class="hidden-auth">
        <nav class="bg-white shadow-sm sticky top-0 z-40 border-b-4 border-yellow-500 p-4">
            <div class="container mx-auto flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Coat_of_arms_of_Central_Java.svg/960px-Coat_of_arms_of_Central_Java.svg.png" class="h-8">
                    <span class="font-black text-blue-900 text-sm">DISKOP UKM JATENG</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="roleLabel" class="text-[10px] font-bold bg-blue-100 text-blue-700 px-3 py-1 rounded-full uppercase"></span>
                    <button onclick="handleLogout()" class="text-red-600"><i class="fas fa-power-off"></i></button>
                </div>
            </div>
        </nav>

        <header class="bg-jateng text-white py-12 text-center">
            <h2 class="text-2xl font-black uppercase">Monitoring & Reservasi</h2>
            <p id="realtimeClock" class="text-yellow-400 font-bold mt-2">00:00:00</p>
        </header>

        <section id="userFormSection" class="container mx-auto px-6 -mt-8 hidden-auth mb-8">
            <div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-2xl border border-gray-100 overflow-visible">
                <form id="bookingForm" class="grid grid-cols-1 lg:grid-cols-3">
                    <div class="p-6 border-r border-gray-100">
                        <label class="text-[10px] font-black text-gray-400 uppercase mb-2 block">1. Pilih Tanggal</label>
                        <div class="bg-gray-50 p-4 rounded-2xl border">
                            <div class="flex justify-between items-center mb-2">
                                <button type="button" onclick="prevMonth()"><i class="fas fa-chevron-left text-xs"></i></button>
                                <span id="calendarMonth" class="text-[10px] font-bold uppercase"></span>
                                <button type="button" onclick="nextMonth()"><i class="fas fa-chevron-right text-xs"></i></button>
                            </div>
                            <div id="calendarGrid" class="grid grid-cols-7 gap-1 text-center"></div>
                        </div>
                        <div id="selectedDateDisplay" class="mt-2 p-2 bg-blue-50 text-blue-700 text-[10px] font-bold rounded-lg text-center">Belum memilih tanggal</div>
                        <input type="hidden" id="tanggal" required>
                    </div>

                    <div class="lg:col-span-2 p-6 space-y-4">
                        <label class="text-[10px] font-black text-gray-400 uppercase block">2. Detail Kegiatan</label>
                        <input type="text" id="kegiatan" placeholder="Nama Kegiatan / Agenda" required class="w-full p-3 bg-gray-50 border rounded-xl text-sm outline-none focus:border-blue-500">
                        
                        <div class="grid grid-cols-2 gap-4">
                            <select id="ruangan" class="p-3 bg-gray-50 border rounded-xl text-sm font-bold">
                                <option>GATOTKACA</option><option>ARJUNA</option><option>ARIMBI</option><option>PODCAST</option>
                            </select>
                            <select id="bidang" class="p-3 bg-gray-50 border rounded-xl text-sm font-bold">
                                <option>UMPEG</option><option>KEUANGAN</option><option>PROGRAM</option><option>PEMASARAN</option>
                            </select>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="relative">
                                <input type="text" id="jamMulai" placeholder="Jam Mulai" readonly onclick="toggleTimePicker('pickerMulai')" class="w-full p-3 bg-gray-50 border rounded-xl text-sm font-bold cursor-pointer">
                                <div id="pickerMulai" class="time-picker-overlay">
                                    <div class="flex justify-around"><div class="time-column" id="hoursMulai"></div><div class="time-column" id="minsMulai"></div></div>
                                    <button type="button" onclick="closeTimePicker('pickerMulai')" class="w-full mt-2 bg-blue-900 text-white py-1 rounded-lg text-xs">SET</button>
                                </div>
                            </div>
                            <div class="relative">
                                <input type="text" id="jamSelesai" placeholder="Jam Selesai" readonly onclick="toggleTimePicker('pickerSelesai')" class="w-full p-3 bg-gray-50 border rounded-xl text-sm font-bold cursor-pointer">
                                <div id="pickerSelesai" class="time-picker-overlay">
                                    <div class="flex justify-around"><div class="time-column" id="hoursSelesai"></div><div class="time-column" id="minsSelesai"></div></div>
                                    <button type="button" onclick="closeTimePicker('pickerSelesai')" class="w-full mt-2 bg-blue-900 text-white py-1 rounded-lg text-xs">SET</button>
                                </div>
                            </div>
                        </div>

                        <input type="text" id="pj" placeholder="Nama Penanggung Jawab" required class="w-full p-3 bg-gray-50 border rounded-xl text-sm outline-none">
                        
                        <button type="submit" id="btnSubmit" class="w-full bg-blue-700 text-white font-black py-4 rounded-xl hover:bg-blue-800 transition uppercase shadow-lg text-sm">
                            Konfirmasi Booking
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <section class="container mx-auto px-6 pb-12">
            <div class="bg-white rounded-3xl shadow-xl overflow-hidden border">
                <div class="p-6 border-b flex justify-between items-center">
                    <h3 class="font-black text-blue-900 uppercase text-sm">Jadwal Ruangan</h3>
                    <select id="filterRuangan" onchange="renderTable()" class="text-xs p-2 border rounded-lg uppercase font-bold">
                        <option value="Semua">Semua Ruangan</option>
                        <option>GATOTKACA</option><option>ARJUNA</option><option>ARIMBI</option><option>PODCAST</option>
                    </select>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-blue-900 text-white uppercase">
                            <tr>
                                <th class="p-4">Waktu</th>
                                <th class="p-4">Ruang</th>
                                <th class="p-4">Kegiatan</th>
                                <th class="p-4 text-center">Status</th>
                                <th class="p-4 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="bookingTableBody" class="divide-y"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <script>
        // --- FIREBASE ---
        const firebaseConfig = { databaseURL: "https://console.firebase.google.com/u/0/project/e-booking-eed92/database/e-booking-eed92-default-rtdb/data/~2F" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let bookings = [];
        let currentUser = JSON.parse(sessionStorage.getItem('active_user')) || null;
        let currentViewDate = new Date();
        let selectedDateStr = "";
        const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

        // --- AUTH ---
        function handleLogin() {
            const u = document.getElementById('username').value.toLowerCase();
            const p = document.getElementById('password').value;
            if ((u === 'admin' && p === 'admin') || (u === 'user' && p === 'user')) {
                currentUser = { role: u };
                sessionStorage.setItem('active_user', JSON.stringify(currentUser));
                initApp();
            } else { Swal.fire('Error', 'Login Gagal', 'error'); }
        }
        function handleLogout() { sessionStorage.clear(); window.location.reload(); }

        function initApp() {
            if (!currentUser) return;
            document.getElementById('loginModal').classList.add('hidden-auth');
            document.getElementById('appContent').classList.remove('hidden-auth');
            document.getElementById('roleLabel').innerText = currentUser.role;
            if (currentUser.role === 'user') {
                document.getElementById('userFormSection').classList.remove('hidden-auth');
                generateTimeOptions('hoursMulai', 'minsMulai', 'jamMulai');
                generateTimeOptions('hoursSelesai', 'minsSelesai', 'jamSelesai');
            }
            initCalendar();
            db.ref('bookings').on('value', (snap) => {
                const val = snap.val();
                bookings = val ? Object.values(val).reverse() : [];
                renderTable();
            });
        }

        // --- CALENDAR ---
        function initCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            const y = currentViewDate.getFullYear();
            const m = currentViewDate.getMonth();
            document.getElementById('calendarMonth').innerText = `${months[m]} ${y}`;
            
            const firstDay = new Date(y, m, 1).getDay();
            const daysInMonth = new Date(y, m + 1, 0).getDate();
            const offset = firstDay === 0 ? 6 : firstDay - 1;

            for (let i = 0; i < offset; i++) grid.innerHTML += `<div></div>`;
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isSelected = selectedDateStr === dateStr ? 'selected' : '';
                grid.innerHTML += `<div onclick="selectDate('${dateStr}')" class="calendar-day ${isSelected}">${d}</div>`;
            }
        }
        function selectDate(d) { 
            selectedDateStr = d; 
            document.getElementById('tanggal').value = d;
            document.getElementById('selectedDateDisplay').innerText = d;
            initCalendar(); 
        }
        function prevMonth() { currentViewDate.setMonth(currentViewDate.getMonth() - 1); initCalendar(); }
        function nextMonth() { currentViewDate.setMonth(currentViewDate.getMonth() + 1); initCalendar(); }

        // --- TIME PICKER ---
        function toggleTimePicker(id) {
            document.querySelectorAll('.time-picker-overlay').forEach(el => el.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
        function closeTimePicker(id) { document.getElementById(id).style.display = 'none'; }

        function generateTimeOptions(hId, mId, inputId) {
            const hEl = document.getElementById(hId);
            const mEl = document.getElementById(mId);
            for(let i=7; i<21; i++) {
                let v = String(i).padStart(2, '0');
                hEl.innerHTML += `<div class="time-unit h-${inputId}" onclick="setTime('${inputId}','H','${v}',this)">${v}</div>`;
            }
            for(let i=0; i<60; i+=15) {
                let v = String(i).padStart(2, '0');
                mEl.innerHTML += `<div class="time-unit m-${inputId}" onclick="setTime('${inputId}','M','${v}',this)">${v}</div>`;
            }
        }

        let tempTime = { jamMulai: {H:'08', M:'00'}, jamSelesai: {H:'09', M:'00'} };
        function setTime(inputId, type, val, el) {
            tempTime[inputId][type] = val;
            el.parentNode.querySelectorAll('.time-unit').forEach(u => u.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(inputId).value = `${tempTime[inputId].H}:${tempTime[inputId].M}`;
        }

        // --- TABLE ---
        function renderTable() {
            const body = document.getElementById('bookingTableBody');
            body.innerHTML = '';
            const filter = document.getElementById('filterRuangan').value;
            const data = filter === 'Semua' ? bookings : bookings.filter(b => b.ruangan === filter);
            data.forEach((b, i) => {
                body.innerHTML += `
                    <tr>
                        <td class="p-4"><b>${b.tanggal}</b><br>${b.jam}</td>
                        <td class="p-4 font-bold text-blue-900">${b.ruangan}</td>
                        <td class="p-4">${b.kegiatan}<br><small class="text-gray-400">PJ: ${b.pj}</small></td>
                        <td class="p-4 text-center"><span class="${b.status === 'Approved' ? 'status-approved' : 'status-pending'} px-2 py-1 rounded-full font-bold text-[9px]">${b.status}</span></td>
                        <td class="p-4 text-center">
                            ${currentUser.role === 'admin' ? `
                                <button onclick="db.ref('bookings/${b.id}').update({status:'Approved'})" class="text-green-600 mr-2">✔</button>
                                <button onclick="db.ref('bookings/${b.id}').remove()" class="text-red-600">✖</button>
                            ` : '-'}
                        </td>
                    </tr>`;
            });
        }

        // --- SUBMIT ---
        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (!selectedDateStr) {
                Swal.fire('Peringatan', 'Silakan pilih tanggal di kalender terlebih dahulu', 'warning');
                return;
            }

            const id = Date.now();
            const data = {
                id: id,
                tanggal: selectedDateStr,
                jam: document.getElementById('jamMulai').value + ' - ' + document.getElementById('jamSelesai').value,
                ruangan: document.getElementById('ruangan').value,
                kegiatan: document.getElementById('kegiatan').value,
                pj: document.getElementById('pj').value,
                status: 'Pending'
            };

            db.ref('bookings/' + id).set(data).then(() => {
                Swal.fire('Berhasil', 'Pemesanan Berhasil Terkirim!', 'success');
                this.reset();
                selectedDateStr = "";
                document.getElementById('selectedDateDisplay').innerText = "Belum memilih tanggal";
                initCalendar();
            });
        });

        window.onload = () => {
            if (currentUser) initApp();
            setInterval(() => {
                document.getElementById('realtimeClock').innerText = new Date().toLocaleTimeString('id-ID');
            }, 1000);
        };
    </script>
</body>
</html>
