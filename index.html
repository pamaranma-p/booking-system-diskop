<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Booking DISKOP UKM - FIX URL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        .hidden-auth { display: none !important; }
        .calendar-day { cursor: pointer !important; transition: 0.2s; }
        .selected-tgl { background: #1e3a8a !important; color: white !important; font-weight: 800; border: 2px solid #fbbf24 !important; }
        #btn-kirim { cursor: pointer !important; position: relative; z-index: 100; }
    </style>
</head>
<body class="bg-slate-100 font-sans">

    <div id="loginGate" class="fixed inset-0 bg-blue-900 flex items-center justify-center z-[9999]">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center">
            <h2 class="font-black text-2xl text-blue-900 mb-6 uppercase">Login E-Booking</h2>
            <input type="text" id="user" placeholder="Username" class="w-full p-4 border-2 rounded-2xl mb-3 outline-none font-bold bg-slate-50">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 border-2 rounded-2xl mb-6 outline-none font-bold bg-slate-50">
            <button onclick="prosesMasuk()" class="w-full bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl uppercase">Masuk</button>
        </div>
    </div>

    <div id="app" class="hidden-auth">
        <nav class="bg-white p-4 shadow flex justify-between items-center sticky top-0 z-[500] border-b-4 border-blue-900">
            <b class="text-blue-900 uppercase text-xs tracking-widest">DISKOP UKM JATENG - <span id="roleText"></span></b>
            <button onclick="location.reload()" class="bg-red-600 text-white px-4 py-1 rounded-lg font-bold text-xs uppercase">Logout</button>
        </nav>

        <div class="container mx-auto p-4 max-w-6xl">
            <div id="areaUser" class="hidden-auth bg-white p-6 rounded-3xl shadow-xl mb-10 border">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="bg-slate-50 p-4 rounded-2xl border">
                        <div class="flex justify-between items-center mb-4 font-black text-blue-900 text-xs uppercase">
                            <button onclick="navBulan(-1)"> < </button>
                            <span id="labelBulan"></span>
                            <button onclick="navBulan(1)"> > </button>
                        </div>
                        <div id="gridKalender" class="grid grid-cols-7 gap-1 text-center text-[10px] font-bold"></div>
                        <div id="tglShow" class="mt-4 p-3 bg-blue-800 text-white text-[10px] font-bold rounded-xl text-center uppercase">Pilih Tanggal</div>
                    </div>
                    <div class="lg:col-span-2 space-y-4">
                        <input type="text" id="f_keg" placeholder="Nama Agenda" class="w-full p-4 border-2 rounded-2xl font-bold bg-slate-50">
                        <div class="grid grid-cols-2 gap-4">
                            <select id="f_ruang" class="p-4 border-2 rounded-2xl font-bold uppercase text-xs"><option>GATOTKACA</option><option>ARJUNA</option><option>ARIMBI</option><option>PODCAST</option></select>
                            <select id="f_bidang" class="p-4 border-2 rounded-2xl font-bold uppercase text-xs"><option>UMPEG</option><option>KEUANGAN</option><option>PROGRAM</option></select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="time" id="f_m" class="p-4 border-2 rounded-2xl font-bold bg-slate-50">
                            <input type="time" id="f_s" class="p-4 border-2 rounded-2xl font-bold bg-slate-50">
                        </div>
                        <input type="text" id="f_pj" placeholder="Penanggung Jawab" class="w-full p-4 border-2 rounded-2xl font-bold bg-slate-50">
                        <button id="btn-kirim" onclick="simpanKeDB()" class="w-full bg-green-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase">Konfirmasi Reservasi</button>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-xl overflow-hidden border">
                <div class="p-5 bg-slate-50 border-b font-black text-blue-900 uppercase text-xs">Jadwal Realtime</div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-blue-900 text-white uppercase">
                            <tr><th class="p-4">Waktu</th><th class="p-4">Ruang</th><th class="p-4">Agenda</th><th class="p-4 text-center">Status</th><th class="p-4 text-center">Aksi Admin</th></tr>
                        </thead>
                        <tbody id="tabelBody" class="divide-y"></tbody>
                    </table>
                </div>
                <div id="loader" class="p-10 text-center font-bold text-slate-400">Menunggu Data...</div>
            </div>
        </div>
    </div>

    <script>
        // --- FIX: URL DATABASE DISESUAIKAN DENGAN GAMBAR ANDA ---
        const firebaseConfig = { 
            databaseURL: "https://e-booking-eed92-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myRole = "";
        let tglFix = "";
        let viewDate = new Date();

        function prosesMasuk() {
            const u = document.getElementById('user').value.toLowerCase();
            const p = document.getElementById('pass').value;
            if ((u === 'admin' && p === 'admin') || (u === 'user' && p === 'user')) {
                myRole = u;
                document.getElementById('loginGate').remove();
                document.getElementById('app').classList.remove('hidden-auth');
                document.getElementById('roleText').innerText = u.toUpperCase();
                if(u === 'user') document.getElementById('areaUser').classList.remove('hidden-auth');
                renderKalender();
                tarikData();
            } else { alert("User/Pass Salah!"); }
        }

        function renderKalender() {
            const grid = document.getElementById('gridKalender');
            grid.innerHTML = "";
            const y = viewDate.getFullYear(), m = viewDate.getMonth();
            const nBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            document.getElementById('labelBulan').innerText = nBulan[m] + " " + y;

            const offset = new Date(y, m, 1).getDay() === 0 ? 6 : new Date(y, m, 1).getDay() - 1;
            const last = new Date(y, m + 1, 0).getDate();

            const h = ["S","S","R","K","J","S","M"];
            h.forEach(x => grid.innerHTML += `<div class="text-slate-300 pb-2">${x}</div>`);

            for(let i=0; i<offset; i++) grid.innerHTML += `<div></div>`;
            for(let d=1; d<=last; d++) {
                const t = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const cls = (t === tglFix) ? 'selected-tgl' : 'bg-white border-slate-100';
                grid.innerHTML += `<div onclick="setT('${t}')" class="calendar-day ${cls} h-10 flex items-center justify-center rounded-xl font-bold border shadow-sm">${d}</div>`;
            }
        }

        function setT(t) { tglFix = t; document.getElementById('tglShow').innerText = "TGL: " + t; renderKalender(); }
        function navBulan(n) { viewDate.setMonth(viewDate.getMonth() + n); renderKalender(); }

        function simpanKeDB() {
            const keg = document.getElementById('f_keg').value;
            const pj = document.getElementById('f_pj').value;
            const m = document.getElementById('f_m').value;
            const s = document.getElementById('f_s').value;

            if(!tglFix || !keg || !pj || !m || !s) return alert("Lengkapi Data!");

            const id = Date.now().toString();
            db.ref('bookings/' + id).set({
                id: id, tanggal: tglFix, jam: m + " - " + s,
                ruangan: document.getElementById('f_ruang').value,
                kegiatan: keg, bidang: document.getElementById('f_bidang').value,
                pj: pj, status: 'Pending'
            }).then(() => {
                Swal.fire('Sip!', 'Data terkirim!', 'success');
                document.getElementById('f_keg').value = "";
                document.getElementById('f_pj').value = "";
                tglFix = ""; renderKalender();
            }).catch(err => alert("Gagal Simpan: " + err.message));
        }

        function tarikData() {
            db.ref('bookings').on('value', (snap) => {
                const tbody = document.getElementById('tabelBody');
                const loader = document.getElementById('loader');
                tbody.innerHTML = "";
                
                const val = snap.val();
                if(!val) { loader.innerText = "Belum Ada Data."; return; }
                loader.style.display = "none";

                const list = Object.keys(val).map(k => val[k]).sort((a,b) => b.id - a.id);

                list.forEach(i => {
                    const stCls = i.status === 'Approved' ? 'bg-green-500 text-white' : (i.status === 'Rejected' ? 'bg-red-500 text-white' : 'bg-yellow-400 text-blue-900');
                    const aksi = (myRole === 'admin') ? `
                        <div class="flex gap-1 justify-center">
                            <button onclick="upStat('${i.id}','Approved')" class="bg-green-600 text-white px-2 py-1 rounded text-[9px]">ACC</button>
                            <button onclick="upStat('${i.id}','Rejected')" class="bg-red-600 text-white px-2 py-1 rounded text-[9px]">TOLAK</button>
                            <button onclick="hapus('${i.id}')" class="bg-slate-200 text-slate-500 px-2 py-1 rounded text-[9px]">Hapus</button>
                        </div>` : '-';

                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-50">
                            <td class="p-4 font-bold">${i.tanggal}<br><small class="text-blue-500">${i.jam}</small></td>
                            <td class="p-4 font-black uppercase text-blue-900">${i.ruangan}</td>
                            <td class="p-4 uppercase">${i.kegiatan}<br><small class="text-slate-400">${i.pj} (${i.bidang})</small></td>
                            <td class="p-4 text-center"><span class="${stCls} px-2 py-1 rounded-full font-bold text-[9px] uppercase">${i.status}</span></td>
                            <td class="p-4 text-center">${aksi}</td>
                        </tr>`;
                });
            });
        }

        function upStat(id, s) { db.ref('bookings/' + id).update({status: s}); }
        function hapus(id) { if(confirm('Hapus?')) db.ref('bookings/' + id).remove(); }
    </script>
</body>
</html>
